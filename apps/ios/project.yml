name: AvaClaw
options:
  bundleIdPrefix: ai.avaclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  AvaClawKit:
    path: ../shared/AvaClawKit
  Swabble:
    path: ../../Swabble

schemes:
  AvaClaw:
    shared: true
    build:
      targets:
        AvaClaw: all
    test:
      targets:
        - AvaClawTests
        - AvaClawLogicTests
  AvaClawLogicTests:
    shared: true
    build:
      targets:
        AvaClawLogicTests: all
    test:
      targets:
        - AvaClawLogicTests

targets:
  AvaClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: AvaClawShareExtension
        embed: true
      - target: AvaClawActivityWidget
        embed: true
      - target: AvaClawWatchApp
      - package: AvaClawKit
      - package: AvaClawKit
        product: AvaClawChatUI
      - package: AvaClawKit
        product: AvaClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/AvaClaw.entitlements
        CODE_SIGN_STYLE: "$(AVACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AVACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AVACLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(AVACLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          AVACLAW_PUSH_TRANSPORT: direct
          AVACLAW_PUSH_DISTRIBUTION: local
          AVACLAW_PUSH_RELAY_BASE_URL: ""
          AVACLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          AVACLAW_PUSH_TRANSPORT: direct
          AVACLAW_PUSH_DISTRIBUTION: local
          AVACLAW_PUSH_RELAY_BASE_URL: ""
          AVACLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: AvaClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.avaclaw.ios
            CFBundleURLSchemes:
              - avaclaw
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.avaclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: AvaClaw discovers and connects to your AvaClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _avaclaw-gw._tcp
        NSCameraUsageDescription: AvaClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: AvaClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: AvaClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: AvaClaw needs microphone access for voice wake.
        NSMotionUsageDescription: AvaClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: AvaClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: AvaClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        AvaClawPushTransport: "$(AVACLAW_PUSH_TRANSPORT)"
        AvaClawPushDistribution: "$(AVACLAW_PUSH_DISTRIBUTION)"
        AvaClawPushRelayBaseURL: "$(AVACLAW_PUSH_RELAY_BASE_URL)"
        AvaClawPushAPNsEnvironment: "$(AVACLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  AvaClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: AvaClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AVACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AVACLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(AVACLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(AVACLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: AvaClaw Share
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  AvaClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/AvaClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AVACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AVACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AVACLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: AvaClaw Activity
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  AvaClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: AvaClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(AVACLAW_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: AvaClaw
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(AVACLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  AvaClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(AVACLAW_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: AvaClaw
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(AVACLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  AvaClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: AvaClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AVACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AVACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.avaclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AvaClaw.app/AvaClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: AvaClawTests
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"

  AvaClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: AvaClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AVACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AVACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.avaclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: AvaClawLogicTests
        CFBundleShortVersionString: "$(AVACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(AVACLAW_BUILD_VERSION)"
