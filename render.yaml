services:
  - type: web
    name: avaclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: AVACLAW_STATE_DIR
        value: /data/.avaclaw
      - key: AVACLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: AVACLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: avaclaw-data
      mountPath: /data
      sizeGB: 1
